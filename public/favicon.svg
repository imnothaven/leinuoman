<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6d365"/>
      <stop offset="50%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#8a5e1e"/>
    </linearGradient>
    <linearGradient id="gold-dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#5c3a0b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- subtle card outline with no black fill -->
  <rect x="10" y="8" width="80" height="84" rx="8" ry="8"
        fill="none" stroke="url(#gold)" stroke-width="1.8" opacity="0.85"/>

  <!-- corner stars -->
  <g fill="url(#gold)" opacity="0.9">
    <polygon points="18,16 19,19 22,19 20,21 21,24 18,22 15,24 16,21 14,19 17,19"/>
    <polygon points="82,16 83,19 86,19 84,21 85,24 82,22 79,24 80,21 78,19 81,19"/>
    <polygon points="18,84 19,81 22,81 20,79 21,76 18,78 15,76 16,79 14,81 17,81"/>
    <polygon points="82,84 83,81 86,81 84,79 85,76 82,78 79,76 80,79 78,81 81,81"/>
  </g>

  <!-- key -->
  <g transform="translate(50,50)" filter="url(#glow)">
    <!-- bow (bottom) -->
    <circle cx="0" cy="22" r="14" fill="none" stroke="url(#gold)" stroke-width="3.5"/>
    <circle cx="0" cy="22" r="5" fill="url(#gold-dark)"/>
    <circle cx="0" cy="22" r="2.2" fill="#f6d365"/>

    <!-- decorative loops on bow -->
    <circle cx="-9" cy="18" r="3.5" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <circle cx="9" cy="18" r="3.5" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <circle cx="-7" cy="28" r="3" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <circle cx="7" cy="28" r="3" fill="none" stroke="url(#gold)" stroke-width="2"/>

    <!-- shaft -->
    <rect x="-3.5" y="-24" width="7" height="46" rx="1.5" fill="url(#gold)"/>
    <rect x="-1.5" y="-24" width="3" height="46" fill="#f6d365" opacity="0.45"/>

    <!-- bit (top) -->
    <g transform="translate(0,-26)">
      <rect x="-10" y="-8" width="20" height="10" rx="1.5" fill="url(#gold-dark)"/>
      <rect x="-10" y="-8" width="20" height="4" fill="url(#gold)" opacity="0.7"/>
      <rect x="-10" y="-8" width="6" height="10" rx="1" fill="url(#gold)"/>
      <rect x="4" y="-8" width="6" height="10" rx="1" fill="url(#gold)"/>
      <rect x="-3" y="-8" width="6" height="10" fill="url(#gold)"/>
    </g>

    <!-- collar -->
    <rect x="-5" y="-6" width="10" height="5" rx="1" fill="url(#gold-dark)"/>
    <circle cx="0" cy="-3.5" r="1.5" fill="#f6d365"/>
  </g>
</svg>